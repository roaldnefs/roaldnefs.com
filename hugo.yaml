    - name: Blog
      pageRef: /posts/
      weight: 2
    - name: Training
      pageRef: /training/
      weight: 3
    - name: Tools
      pageRef: /tools/
      weight: 4
    - name: About
      pageRef: /about/
      weight: 5
    - name: GitHub
      weight: 7
      url: "https://github.com/roaldnefs"
      params:
        icon: github
    - name: LinkedIn
      weight: 8
      url: "https://www.linkedin.com/in/roaldnefs/"
      params:
        icon: linkedin
    - name: Mastodon
      weight: 9
      url: "https://infosec.exchange/@roald"
      params:
        icon: mastodon

params:
  description: Personal research blog on security, platform engineering, and hardware hacking.
  author:
    name: Roald Nefs
    email: info@roaldnefs.com
